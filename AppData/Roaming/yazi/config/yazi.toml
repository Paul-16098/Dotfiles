"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
sort_by = "natural"
show_hidden = true
show_symlink = false
linemode = "mtime"

[preview]
wrap = "yes"

[[opener.edit]]
run = "%EDITOR% %s"
desc = "$EDITOR"
block = true

[[opener.open]]
run = 'start "" %s1'
desc = "Open"
for = "windows"
orphan = true

[[opener.open]]
run = 'sudo start "" %s1'
desc = "Open with sudo"
for = "windows"
orphan = true

[[opener.open]]
run = '"C:\Program Files\Sandboxie-Plus\Start.exe" /box:__ask__ %s1'
desc = "Open With Sandboxie"
for = "windows"

[[opener.copyimage]]
# if file name contains space, it will be treated as multiple arguments
run = 'nu --config ~\\.config\\nushell\\config.nu --env-config ~\\.config\\nushell\\env.nu --commands "clip copy-image %s"'
desc = "Copy Image to Clipboard"
for = "windows"

[[opener.get-dll]]
run = 'nu --config ~\\.config\\nushell\\config.nu --env-config ~\\.config\\nushell\\env.nu --commands "(get-dll %s1);pause"'
desc = "Get DLL Path"
for = "windows"
block = true

[[opener.extract]]
run = "Bandizip %s"
desc = "Extract with Bandizip"
for = "windows"

[[opener.extract]]
run = "ya pub extract --list %s"
desc = "Extract here"

[[opener.nodejs]]
run = 'start nu --config ~\\.config\\nushell\\config.nu --env-config ~\\.config\\nushell\\env.nu --commands "node %s;pause"'
desc = "Run with Node.js"
orphan = true

[[opener.python]]
run = 'start nu --config ~\\.config\\nushell\\config.nu --env-config ~\\.config\\nushell\\env.nu --commands "uv run %s;pause"'
desc = "Run with Python"
orphan = true

[[opener.nushell]]
run = "start nu --config ~\\.config\\nushell\\config.nu --env-config ~\\.config\\nushell\\env.nu %s"
desc = "Open with Nushell"
orphan = true

[[opener.docker-compose-pull]]
run = "docker compose --file %s pull"
desc = "Pull with Docker Compose"
block = true

[[opener.bulk-rename]]
run = "code-insiders --wait %s"
block = true

[[open.prepend_rules]]
url = "bulk-rename.txt"
use = "bulk-rename"

[[open.rules]]
url = "*.nu"
use = [
  "nushell",
  "edit",
  "reveal",
]

# not work
[[open.rules]]
url = "docker-compose.yaml"
use = [
  "docker-compose-pull",
  "edit",
  "reveal",
]

[[open.rules]]
url = "*.exe"
use = [
  "open",
  "get-dll",
  "reveal",
]

[[open.rules]]
mime = "image/gif"
use = [
  "play",
  "reveal",
]

[[open.rules]]
# image
mime = "image/*"
use = [
  "open",
  "copyimage",
  "reveal",
]

[[open.rules]]
# media
mime = "{audio,video}/*"
use = [
  "play",
  "reveal",
]

[[open.rules]]
# jar file is actually a zip archive, but it's more user-friendly to open it with java
mime = "application/java-archive"
use = [
  "open",
  "extract",
  "reveal",
]

[[open.rules]]
# archive
mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}"
use = [
  "extract",
  "reveal",
]

[[open.rules]]
# data
mime = "*/{json,ndjson,yaml}"
use = [
  "edit",
  "reveal",
]

[[open.rules]]
# code
mime = "*/javascript"
use = [
  "nodejs",
  "edit",
  "reveal",
]

[[open.rules]]
mime = "text/python"
use = [
  "python",
  "edit",
  "reveal",
]

[[open.rules]]
mime = "inode/empty"
use = [
  "edit",
  "reveal",
]

[[open.rules]]
mime = "vfs/{absent,stale}"
use = "download"

[[open.rules]]
url = "*"
use = [
  "open",
  "edit",
  "reveal",
]

[[open.rules]]
url = "*/"
use = [
  "edit",
  "reveal",
]


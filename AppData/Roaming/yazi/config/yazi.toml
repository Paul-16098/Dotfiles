[[plugin.prepend_preloaders]]
url = "*.{otf,ttf,woff,woff2}"
run = "font-sample"

# spotters
[[plugin.prepend_spotters]]
mime = "audio/*"
run = "spot-audio"

[[plugin.prepend_spotters]]
mime = "image/*"
run = "spot-image"

[[plugin.prepend_spotters]]
